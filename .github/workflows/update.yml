name: build-and-update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions: write-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-update-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found, skipping installation."
          fi

      # 1. 运行你的爬虫脚本
      - name: Run collect and update script
        run: |
          echo "=== 开始执行爬虫脚本 ==="
          python -u scraper.py
          echo "=== 脚本执行完毕 ==="

      # 2. 【核心排查】检查生成的 output 文件大小和内容
      - name: Inspect output files
        run: |
          echo "=== 检查输出文件夹内容 ==="
          ls -lh output/ || ls -lh
          
          echo "=== 检查 nodes.txt 前 5 行 ==="
          head -n 5 output/nodes.txt || echo "nodes.txt 无法读取"
          
          echo "=== 检查 sub.txt 前 5 行 ==="
          head -n 5 output/sub.txt || echo "sub.txt 无法读取"

      # 3. 自动提交变动
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 强制将所有新生成和修改的文件加入缓存区
          git add output/nodes.txt output/sub.txt || git add .
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: 自动更新节点数据 [$(date +'%Y-%m-%d %H:%M:%S')]"
            git push origin HEAD:main
          else
            echo "提示：文件内容没有发生任何实质性变化，跳过本次推送。"
          fi
